 max-width: 1100px;\n    margin: 0 auto;\n  }\n\n  /* ── Header ── */\n  .section-label {\n    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;\n  }\n  .section-label .bar { width: 24px; height: 3px; background: var(--lime); border-radius: 2px; }\n  .section-label span {\n    font-size: 12px; font-weight: 700; color: var(--navy);\n    letter-spacing: 0.06em; text-transform: uppercase;\n  }\n  .section h2 {\n    font-size: 32px; font-weight: 800; color: var(--navy);\n    line-height: 1.2; letter-spacing: -0.03em; margin-bottom: 8px;\n  }\n  .section-sub {\n    font-size: 15px; color: var(--text-secondary); line-height: 1.6;\n    max-width: 680px; margin-bottom: 36px;\n  }\n\n  /* ── Horizontal Tabs ── */\n  .outcome-tabs {\n    display: flex; gap: 0; border-bottom: 2px solid var(--border-light);\n    overflow-x: auto; -webkit-overflow-scrolling: touch;\n    margin-bottom: 0;\n    scrollbar-width: none;\n  }\n  .outcome-tabs::-webkit-scrollbar { display: none; }\n  .o-tab {\n    padding: 14px 22px; font-family: var(--font);\n    font-size: 13px; font-weight: 600; color: var(--text-muted);\n    background: none; border: none; cursor: pointer;\n    border-bottom: 3px solid transparent; margin-bottom: -2px;\n    white-space: nowrap; transition: all 0.2s;\n    position: relative;\n  }\n  .o-tab:hover { color: var(--navy); }\n  .o-tab.active {\n    color: var(--navy); border-bottom-color: var(--lime);\n    font-weight: 700;\n  }\n  .o-tab .tab-num {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 20px; height: 20px; border-radius: 50%;\n    background: var(--border-light); color: var(--text-muted);\n    font-size: 10px; font-weight: 700; margin-right: 6px;\n    transition: all 0.2s;\n  }\n  .o-tab.active .tab-num {\n    background: var(--navy); color: var(--white);\n  }\n\n  /* ── Panel ── */\n  .o-panel {\n    display: none;\n    background: var(--surface);\n    border: 1px solid var(--border-light);\n    border-top: none;\n    border-radius: 0 0 var(--radius-xl) var(--radius-xl);\n    overflow: hidden;\n    animation: panelIn 0.35s ease;\n  }\n  .o-panel.active { display: block; }\n  @keyframes panelIn {\n    from { opacity: 0; transform: translateY(6px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ── Split Layout ── */\n  .o-split {\n    display: grid; grid-template-columns: 1fr 1fr;\n    min-height: 420px;\n  }\n\n  /* Left: Text Content */\n  .o-text {\n    padding: 40px 36px;\n    display: flex; flex-direction: column; justify-content: center;\n  }\n  .o-text h3 {\n    font-size: 22px; font-weight: 800; color: var(--text-primary);\n    line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 12px;\n  }\n  .o-text > p {\n    font-size: 14px; color: var(--text-secondary); line-height: 1.7;\n    margin-bottom: 20px;\n  }\n  .o-list {\n    list-style: none; margin-bottom: 24px;\n  }\n  .o-list li {\n    display: flex; align-items: flex-start; gap: 10px;\n    padding: 9px 0; font-size: 13.5px; color: var(--text-primary);\n    border-bottom: 1px solid var(--border-light);\n    line-height: 1.5;\n  }\n  .o-list li:last-child { border-bottom: none; }\n  .o-check {\n    width: 20px; height: 20px; border-radius: 50%; background: var(--lime);\n    display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n    margin-top: 1px;\n  }\n  .o-check svg { width: 10px; height: 10px; }\n\n  .o-cta {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 11px 24px; background: var(--navy); color: var(--white);\n    font-size: 13px; font-weight: 700; border: none; border-radius: 8px;\n    cursor: pointer; font-family: var(--font); transition: background 0.15s;\n    text-decoration: none; width: fit-content;\n  }\n  .o-cta:hover { background: var(--navy-light); }\n\n  /* Right: Rich Embed / Chart Area */\n  .o-visual {\n    background: var(--navy);\n    padding: 32px;\n    display: flex; flex-direction: column; justify-content: center;\n    position: relative;\n  }\n  .o-visual-label {\n    font-size: 10px; font-weight: 700; color: var(--lime);\n    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;\n  }\n  .o-visual-title {\n    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7);\n    margin-bottom: 20px; line-height: 1.4;\n  }\n\n  /* ── Rich Embed: Heatmap ── */\n  .heatmap-grid {\n    display: grid; grid-template-columns: 100px repeat(5,1fr); gap: 3px;\n    font-size: 11px;\n  }\n  .hm-hdr {\n    padding: 8px 4px; font-weight: 700;\n    color: rgba(255,255,255,0.5); text-align: center;\n    font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em;\n  }\n  .hm-row-label {\n    padding: 10px 8px; font-weight: 600;\n    color: rgba(255,255,255,0.8); display: flex; align-items: center;\n    font-size: 11px;\n  }\n  .hm-cell {\n    padding: 10px 4px; text-align: center; font-weight: 700;\n    color: #fff; border-radius: 6px; font-size: 12px;\n    transition: transform 0.15s;\n  }\n  .hm-cell:hover { transform: scale(1.08); }\n  .hm-cell.green { background: var(--accent-green); }\n  .hm-cell.amber { background: var(--accent-amber); }\n  .hm-cell.red { background: var(--accent-red); }\n\n  .chart-legend {\n    display: flex; gap: 14px; flex-wrap: wrap; margin-top: 16px;\n  }\n  .cl-item {\n    display: flex; align-items: center; gap: 5px;\n    font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 500;\n  }\n  .cl-swatch { width: 8px; height: 8px; border-radius: 3px; }\n\n  /* ── Rich Embed: Stacked Bars ── */\n  .stacked-bars { display: flex; flex-direction: column; gap: 12px; }\n  .sb-row { display: flex; align-items: center; gap: 12px; }\n  .sb-label {\n    font-size: 11px; color: rgba(255,255,255,0.6);\n    width: 80px; text-align: right; flex-shrink: 0; font-weight: 500;\n  }\n  .sb-track {\n    flex: 1; height: 28px; display: flex;\n    border-radius: 6px; overflow: hidden;\n  }\n  .sb-seg {\n    height: 100%; display: flex; align-items: center; justify-content: center;\n    font-size: 9px; font-weight: 700; color: #fff;\n    transition: flex-grow 0.4s ease;\n  }\n\n  /* ── Rich Embed: Bubble Chart ── */\n  .bubble-area {\n    position: relative; height: 240px;\n    border-left: 1.5px solid rgba(255,255,255,0.12);\n    border-bottom: 1.5px solid rgba(255,255,255,0.12);\n    margin: 8px 0 8px 16px;\n  }\n  .b-axis-x {\n    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);\n    font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.05em;\n  }\n  .b-axis-y {\n    position: absolute; left: -14px; top: 50%; transform: translateY(-50%) rotate(-90deg);\n    font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 600; white-space: nowrap; letter-spacing: 0.05em;\n  }\n  .bub {\n    position: absolute; border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 9px; font-weight: 700; color: #fff;\n    cursor: default; transition: transform 0.2s; opacity: 0.85;\n  }\n  .bub:hover { transform: scale(1.18); opacity: 1; }\n  .bub-tip {\n    display: none; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);\n    background: var(--navy-dark); color: #fff; padding: 6px 10px;\n    border-radius: 6px; font-size: 10px; white-space: nowrap; z-index: 10;\n    border: 1px solid rgba(255,255,255,0.1);\n  }\n  .bub:hover .bub-tip { display: block; }\n\n  /* ── Rich Embed: Pyramid ── */\n  .pyramid { display: flex; flex-direction: column; align-items: center; gap: 6px; }\n  .pyramid-bar {\n    padding: 14px 16px; color: #fff; text-align: center;\n    border-radius: 8px; font-size: 12px; font-weight: 600;\n    transition: transform 0.2s;\n  }\n  .pyramid-bar:hover { transform: scale(1.02); }\n\n  /* ── Rich Embed: Donut/Pie ── */\n  .donut-wrap { display: flex; align-items: center; gap: 28px; }\n  .donut-svg { width: 160px; height: 160px; flex-shrink: 0; }\n  .donut-legend { flex: 1; }\n  .donut-row {\n    display: flex; align-items: center; gap: 8px;\n    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08);\n    font-size: 11px; color: rgba(255,255,255,0.7);\n  }\n  .donut-row:last-child { border-bottom: none; }\n  .donut-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }\n  .donut-pct { font-weight: 700; margin-left: auto; color: #fff; }\n\n  /* ── Rich Embed: Roadmap Timeline ── */\n  .roadmap-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }\n  .rm-phase { border-radius: var(--radius); overflow: hidden; }\n  .rm-head {\n    padding: 12px 14px; font-size: 11px; font-weight: 700; color: #fff;\n    letter-spacing: 0.02em;\n  }\n  .rm-body {\n    padding: 14px; background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.08); border-top: none;\n    border-radius: 0 0 var(--radius) var(--radius);\n  }\n  .rm-body li {\n    font-size: 11px; color: rgba(255,255,255,0.7); padding: 4px 0;\n    list-style: none; display: flex; gap: 6px; line-height: 1.4;\n  }\n  .rm-body li::before { content: '→'; color: var(--lime); flex-shrink: 0; font-weight: 700; }\n\n  /* ── Callout Banner ── */\n  .callout-bar {\n    background: var(--lime-dim);\n    border: 1px solid rgba(197,232,38,0.2);\n    border-radius: 0 0 var(--radius-xl) var(--radius-xl);\n    padding: 16px 36px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .callout-bar .callout-icon {\n    width: 28px; height: 28px; border-radius: 50%;\n    background: var(--lime); display: flex; align-items: center;\n    justify-content: center; flex-shrink: 0;\n  }\n  .callout-bar p {\n    font-size: 13px; color: var(--navy); font-weight: 600; line-height: 1.5;\n  }\n\n  /* ── Responsive ── */\n  @media (max-width: 768px) {\n    .section { padding: 40px 20px; }\n    .section h2 { font-size: 24px; }\n    .o-split { grid-template-columns: 1fr; }\n    .o-visual { min-height: 280px; }\n    .heatmap-grid { grid-template-columns: 80px repeat(5,1fr); font-size: 9px; }\n    .roadmap-cols { grid-template-columns: 1fr; }\n    .donut-wrap { flex-direction: column; }\n    .callout-bar { border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 14px 20px; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<section class=\"section\">\n  <div class=\"section-inner\">\n\n    <!-- Header -->\n    <div class=\"section-label\">\n      <div class=\"bar\"><\/div>\n      <span>Outcomes &amp; Deliverables<\/span>\n    <\/div>\n    <h2>Diagnostic Outcomes &amp; Deliverables<\/h2>\n    <p class=\"section-sub\">Each deliverable enables a specific enterprise decision — from board-level investment cases to team-level learning plans.<\/p>\n\n    <!-- Tabs -->\n    <div class=\"outcome-tabs\" role=\"tablist\">\n      <button class=\"o-tab active\" data-panel=\"p-heatmap\"><span class=\"tab-num\">1<\/span>Skill Heatmap<\/button>\n      <button class=\"o-tab\" data-panel=\"p-coverage\"><span class=\"tab-num\">2<\/span>Role Coverage<\/button>\n      <button class=\"o-tab\" data-panel=\"p-risk\"><span class=\"tab-num\">3<\/span>Risk Classification<\/button>\n      <button class=\"o-tab\" data-panel=\"p-leadership\"><span class=\"tab-num\">4<\/span>Leadership Readiness<\/button>\n      <button class=\"o-tab\" data-panel=\"p-root\"><span class=\"tab-num\">5<\/span>Root Cause Clarity<\/button>\n      <button class=\"o-tab\" data-panel=\"p-roadmap\"><span class=\"tab-num\">6<\/span>30-60-90 Roadmap<\/button>\n    <\/div>\n\n    <!-- ═══ Panel 1: Skill Heatmap ═══ -->\n    <div class=\"o-panel active\" id=\"p-heatmap\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Skill Mapping &amp; Capability Assessment<\/h3>\n          <p>Role-based skill mapping quantified across teams, levels, and leadership pipelines. Every capability gap is measured, not assumed.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Role-specific skill proficiency mapping across all assessed job families<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Team- and department-level capability aggregation with drill-down<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Quantified gap severity scores (1–5) with confidence intervals<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Leadership pipeline readiness indicators by competency cluster<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Skill Gap Heatmap — Role Groups × Skill Domains<\/div>\n          <div class=\"heatmap-grid\">\n            <div class=\"hm-hdr\"><\/div><div class=\"hm-hdr\">Strategic<\/div><div class=\"hm-hdr\">Technical<\/div><div class=\"hm-hdr\">Digital<\/div><div class=\"hm-hdr\">Leadership<\/div><div class=\"hm-hdr\">Analytical<\/div>\n            <div class=\"hm-row-label\">Senior Leaders<\/div><div class=\"hm-cell green\">4.2<\/div><div class=\"hm-cell amber\">2.8<\/div><div class=\"hm-cell red\">1.9<\/div><div class=\"hm-cell green\">4.0<\/div><div class=\"hm-cell amber\">3.1<\/div>\n            <div class=\"hm-row-label\">Mid Managers<\/div><div class=\"hm-cell amber\">3.0<\/div><div class=\"hm-cell green\">3.8<\/div><div class=\"hm-cell amber\">2.5<\/div><div class=\"hm-cell red\">2.1<\/div><div class=\"hm-cell green\">3.6<\/div>\n            <div class=\"hm-row-label\">Team Leads<\/div><div class=\"hm-cell red\">2.0<\/div><div class=\"hm-cell green\">3.9<\/div><div class=\"hm-cell amber\">2.7<\/div><div class=\"hm-cell red\">1.8<\/div><div class=\"hm-cell amber\">3.2<\/div>\n            <div class=\"hm-row-label\">IC / Specialists<\/div><div class=\"hm-cell red\">1.5<\/div><div class=\"hm-cell green\">4.3<\/div><div class=\"hm-cell green\">3.5<\/div><div class=\"hm-cell red\">1.4<\/div><div class=\"hm-cell green\">4.1<\/div>\n            <div class=\"hm-row-label\">Operations<\/div><div class=\"hm-cell red\">1.8<\/div><div class=\"hm-cell amber\">2.9<\/div><div class=\"hm-cell red\">1.7<\/div><div class=\"hm-cell amber\">2.4<\/div><div class=\"hm-cell amber\">2.6<\/div>\n          <\/div>\n          <div class=\"chart-legend\">\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-green)\"><\/div> 3.5+ Proficient<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-amber)\"><\/div> 2.5–3.4 Developing<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-red)\"><\/div> &lt;2.5 Critical<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ═══ Panel 2: Role Coverage ═══ -->\n    <div class=\"o-panel\" id=\"p-coverage\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Role-Based Skill Coverage Analysis<\/h3>\n          <p>Role-wise readiness vs. requirement across critical job families. Identifies which roles need the most investment.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Skill coverage percentage by role group and proficiency tier<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Gap-to-target ratios for priority competencies<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Team-level comparisons for resource allocation decisions<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Role Coverage — Stacked Proficiency Breakdown<\/div>\n          <div class=\"chart-legend\" style=\"margin-top:0;margin-bottom:14px\">\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-red)\"><\/div> Foundational<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-amber)\"><\/div> Intermediate<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-blue)\"><\/div> Advanced<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-green)\"><\/div> Expert<\/div>\n          <\/div>\n          <div class=\"stacked-bars\">\n            <div class=\"sb-row\"><div class=\"sb-label\">Engineering<\/div><div class=\"sb-track\"><div class=\"sb-seg\" style=\"flex:12;background:var(--accent-red)\">12%<\/div><div class=\"sb-seg\" style=\"flex:28;background:var(--accent-amber)\">28%<\/div><div class=\"sb-seg\" style=\"flex:38;background:var(--accent-blue)\">38%<\/div><div class=\"sb-seg\" style=\"flex:22;background:var(--accent-green)\">22%<\/div><\/div><\/div>\n            <div class=\"sb-row\"><div class=\"sb-label\">Product<\/div><div class=\"sb-track\"><div class=\"sb-seg\" style=\"flex:8;background:var(--accent-red)\"><\/div><div class=\"sb-seg\" style=\"flex:35;background:var(--accent-amber)\">35%<\/div><div class=\"sb-seg\" style=\"flex:40;background:var(--accent-blue)\">40%<\/div><div class=\"sb-seg\" style=\"flex:17;background:var(--accent-green)\">17%<\/div><\/div><\/div>\n            <div class=\"sb-row\"><div class=\"sb-label\">Operations<\/div><div class=\"sb-track\"><div class=\"sb-seg\" style=\"flex:22;background:var(--accent-red)\">22%<\/div><div class=\"sb-seg\" style=\"flex:38;background:var(--accent-amber)\">38%<\/div><div class=\"sb-seg\" style=\"flex:28;background:var(--accent-blue)\">28%<\/div><div class=\"sb-seg\" style=\"flex:12;background:var(--accent-green)\">12%<\/div><\/div><\/div>\n            <div class=\"sb-row\"><div class=\"sb-label\">Sales<\/div><div class=\"sb-track\"><div class=\"sb-seg\" style=\"flex:18;background:var(--accent-red)\">18%<\/div><div class=\"sb-seg\" style=\"flex:42;background:var(--accent-amber)\">42%<\/div><div class=\"sb-seg\" style=\"flex:30;background:var(--accent-blue)\">30%<\/div><div class=\"sb-seg\" style=\"flex:10;background:var(--accent-green)\">10%<\/div><\/div><\/div>\n            <div class=\"sb-row\"><div class=\"sb-label\">Leadership<\/div><div class=\"sb-track\"><div class=\"sb-seg\" style=\"flex:5;background:var(--accent-red)\"><\/div><div class=\"sb-seg\" style=\"flex:25;background:var(--accent-amber)\">25%<\/div><div class=\"sb-seg\" style=\"flex:45;background:var(--accent-blue)\">45%<\/div><div class=\"sb-seg\" style=\"flex:25;background:var(--accent-green)\">25%<\/div><\/div><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ═══ Panel 3: Risk Classification ═══ -->\n    <div class=\"o-panel\" id=\"p-risk\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Skill Criticality &amp; Risk Classification<\/h3>\n          <p>Ranks every identified skill gap by business impact and workforce exposure for risk-weighted investment allocation.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Business impact scoring (revenue, safety, compliance)<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Workforce exposure measurement (% of roles affected)<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Board-ready risk visualization for executive reporting<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Skill Risk Matrix — Business Impact × Availability<\/div>\n          <div class=\"chart-legend\" style=\"margin-top:0;margin-bottom:8px\">\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-red)\"><\/div> Revenue Risk<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-amber)\"><\/div> Compliance Risk<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-blue)\"><\/div> Safety Risk<\/div>\n          <\/div>\n          <div class=\"bubble-area\">\n            <div class=\"b-axis-x\">Business Impact →<\/div>\n            <div class=\"b-axis-y\">Skill Availability →<\/div>\n            <div class=\"bub\" style=\"width:62px;height:62px;background:var(--accent-red);left:70%;bottom:16%\">AI/ML<div class=\"bub-tip\">AI/ML — High impact, low availability — 340 roles<\/div><\/div>\n            <div class=\"bub\" style=\"width:48px;height:48px;background:var(--accent-amber);left:52%;bottom:36%\">GRC<div class=\"bub-tip\">Governance — Moderate impact — 210 roles<\/div><\/div>\n            <div class=\"bub\" style=\"width:40px;height:40px;background:var(--accent-blue);left:30%;bottom:52%\">Safety<div class=\"bub-tip\">Safety — Moderate impact — 180 roles<\/div><\/div>\n            <div class=\"bub\" style=\"width:56px;height:56px;background:var(--accent-red);left:78%;bottom:26%\">Cloud<div class=\"bub-tip\">Cloud Architecture — Very high impact — 280 roles<\/div><\/div>\n            <div class=\"bub\" style=\"width:34px;height:34px;background:var(--accent-amber);left:16%;bottom:62%\">PM<div class=\"bub-tip\">Project Mgmt — Lower impact — 120 roles<\/div><\/div>\n            <div class=\"bub\" style=\"width:44px;height:44px;background:var(--accent-red);left:60%;bottom:40%\">Data<div class=\"bub-tip\">Data Engineering — High impact — 240 roles<\/div><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ═══ Panel 4: Leadership Readiness ═══ -->\n    <div class=\"o-panel\" id=\"p-leadership\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Leadership &amp; Critical Capability Readiness<\/h3>\n          <p>Maps leadership competency readiness across the hierarchy and identifies succession opportunities in critical roles.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Leadership competency profiling by tier (C-suite to first-time managers)<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Succession readiness scores for critical positions<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Future-state capability model aligned to strategic goals<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>High-potential identification with development pathways<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Leadership Competency Pyramid — Readiness by Tier<\/div>\n          <div class=\"pyramid\">\n            <div class=\"pyramid-bar\" style=\"width:35%;background:var(--accent-green)\">C-Suite — 82% Ready<\/div>\n            <div class=\"pyramid-bar\" style=\"width:52%;background:var(--accent-amber)\">Senior Directors — 61% Ready<\/div>\n            <div class=\"pyramid-bar\" style=\"width:72%;background:var(--accent-red)\">Mid-Level Managers — 43% Ready<\/div>\n            <div class=\"pyramid-bar\" style=\"width:92%;background:var(--accent-red)\">First-Time Managers — 28% Ready<\/div>\n          <\/div>\n          <div class=\"chart-legend\" style=\"justify-content:center;\">\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-green)\"><\/div> Ready (≥70%)<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-amber)\"><\/div> Developing (50–69%)<\/div>\n            <div class=\"cl-item\"><div class=\"cl-swatch\" style=\"background:var(--accent-red)\"><\/div> Opportunity (&lt;50%)<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ═══ Panel 5: Root Cause Clarity ═══ -->\n    <div class=\"o-panel\" id=\"p-root\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Root Cause Clarity: Learning vs. Operational<\/h3>\n          <p>Not every performance gap is a training gap. This analysis separates true skill deficiencies from process, tools, role design, and leadership constraints.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Performance gap categorization by root cause type<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Non-training intervention recommendations<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Training spend redirection opportunities quantified<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Performance Gap Root Cause Distribution<\/div>\n          <div class=\"donut-wrap\">\n            <svg class=\"donut-svg\" viewBox=\"0 0 200 200\">\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"rgba(255,255,255,0.06)\" stroke-width=\"30\"/>\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"var(--accent-blue)\" stroke-width=\"30\" stroke-dasharray=\"167 440\" stroke-dashoffset=\"0\" transform=\"rotate(-90 100 100)\"/>\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"var(--accent-amber)\" stroke-width=\"30\" stroke-dasharray=\"106 440\" stroke-dashoffset=\"-167\" transform=\"rotate(-90 100 100)\"/>\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"var(--accent-green)\" stroke-width=\"30\" stroke-dasharray=\"79 440\" stroke-dashoffset=\"-273\" transform=\"rotate(-90 100 100)\"/>\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"var(--accent-violet)\" stroke-width=\"30\" stroke-dasharray=\"53 440\" stroke-dashoffset=\"-352\" transform=\"rotate(-90 100 100)\"/>\n              <circle cx=\"100\" cy=\"100\" r=\"70\" fill=\"none\" stroke=\"var(--accent-red)\" stroke-width=\"30\" stroke-dasharray=\"35 440\" stroke-dashoffset=\"-405\" transform=\"rotate(-90 100 100)\"/>\n              <text x=\"100\" y=\"96\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"800\" fill=\"#fff\">62%<\/text>\n              <text x=\"100\" y=\"114\" text-anchor=\"middle\" font-size=\"9\" fill=\"rgba(255,255,255,0.5)\" font-weight=\"500\">Non-Training<\/text>\n            <\/svg>\n            <div class=\"donut-legend\">\n              <div class=\"donut-row\"><div class=\"donut-swatch\" style=\"background:var(--accent-blue)\"><\/div> Training / Skill Gaps <div class=\"donut-pct\">38%<\/div><\/div>\n              <div class=\"donut-row\"><div class=\"donut-swatch\" style=\"background:var(--accent-amber)\"><\/div> Process Gaps <div class=\"donut-pct\">24%<\/div><\/div>\n              <div class=\"donut-row\"><div class=\"donut-swatch\" style=\"background:var(--accent-green)\"><\/div> Tools &amp; Systems <div class=\"donut-pct\">18%<\/div><\/div>\n              <div class=\"donut-row\"><div class=\"donut-swatch\" style=\"background:var(--accent-violet)\"><\/div> Role Design <div class=\"donut-pct\">12%<\/div><\/div>\n              <div class=\"donut-row\"><div class=\"donut-swatch\" style=\"background:var(--accent-red)\"><\/div> Leadership <div class=\"donut-pct\">8%<\/div><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ═══ Panel 6: 30-60-90 Roadmap ═══ -->\n    <div class=\"o-panel\" id=\"p-roadmap\">\n      <div class=\"o-split\">\n        <div class=\"o-text\">\n          <h3>Prioritized 30–60–90 Day Capability Roadmap<\/h3>\n          <p>Role- and level-specific interventions organized into a phased, executable plan with clear ownership and success metrics.<\/p>\n          <ul class=\"o-list\">\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Phased intervention calendar with role-specific pathways<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Modular learning architecture (not monolithic programs)<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Non-training recommendations integrated into the roadmap<\/li>\n            <li><span class=\"o-check\"><svg viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6l2.5 2.5 4.5-5\" stroke=\"#1A2600\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/span>Measurement framework with leading and lagging indicators<\/li>\n          <\/ul>\n          <a href=\"#\" class=\"o-cta\">Download Sample Roadmap <svg width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-width=\"2\" d=\"M12 5v14m0 0l-6-6m6 6l6-6\"/><\/svg><\/a>\n        <\/div>\n        <div class=\"o-visual\">\n          <div class=\"o-visual-label\">Sample Output<\/div>\n          <div class=\"o-visual-title\">Phased Capability Roadmap<\/div>\n          <div class=\"roadmap-cols\">\n            <div class=\"rm-phase\"><div class=\"rm-head\" style=\"background:var(--accent-red)\">Days 1–30: Critical<\/div><div class=\"rm-body\"><ul><li>Close compliance-critical skill gaps<\/li><li>Deploy safety &amp; regulatory training<\/li><li>Address role-design issues<\/li><li>Launch manager capability baselines<\/li><\/ul><\/div><\/div>\n            <div class=\"rm-phase\"><div class=\"rm-head\" style=\"background:var(--accent-amber)\">Days 31–60: Build<\/div><div class=\"rm-body\"><ul><li>Roll out technical upskilling<\/li><li>Launch leadership tracks<\/li><li>Implement process improvements<\/li><li>Begin tools/systems remediation<\/li><\/ul><\/div><\/div>\n            <div class=\"rm-phase\"><div class=\"rm-head\" style=\"background:var(--accent-green)\">Days 61–90: Growth<\/div><div class=\"rm-body\"><ul><li>Deploy future-state programs<\/li><li>Activate succession pipeline<\/li><li>Measure impact vs. baseline KPIs<\/li><li>Calibrate learning architecture<\/li><\/ul><\/div><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"callout-bar\">\n        <div class=\"callout-icon\"><svg width=\"14\" height=\"14\" fill=\"none\" stroke=\"#1A2600\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-width=\"2\" d=\"M13 10V3L4 14h7v7l9-11h-7z\"/><\/svg><\/div>\n        <p>Clear visibility on what to fix, what to train, what not to train, and where to invest first.<\/p>\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/section>\n\n<script>\n(function(){\n  var tabs = document.querySelectorAll('.o-tab');\n  tabs.forEach(function(tab) {\n    tab.addEventListener('click', function() {\n      tabs.forEach(function(t) { t.classList.remove('active'); });\n      tab.classList.add('active');\n      document.querySelectorAll('.o-panel').forEach(function(p) { p.classList.remove('active'); });\n      var panel = document.getElementById(tab.getAttribute('data-panel'));\n      if (panel) panel.classList.add('active');\n    });\n  });\n})();\n<\/script>\n<\/body>\n<\/html>\n","edstellar-process-card-grid.html":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Edstellar — Process Section: Option C (Card Grid)<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --navy: #2D2F6B;\n    --navy-card: #2E3054;\n    --lime: #C5E826;\n    --lime-text: #1A2600;\n    --lime-dim: rgba(197,232,38,0.08);\n    --white: #FFFFFF;\n    --light-bg: #EEF0F4;\n    --surface: #FFFFFF;\n    --text-primary: #1A1A2E;\n    --text-secondary: #5C5E6E;\n    --text-muted: #8A8C9A;\n    --border: #DCDEE5;\n    --radius-lg: 16px;\n    --radius-xl: 24px;\n    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;\n  }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font); background:var(--light-bg); -webkit-font-smoothing:antialiased; }\n\n  .section { padding:64px 48px; background:var(--light-bg); }\n  .section-inner { max-width:1060px; margin:0 auto; }\n\n  .section-header { text-align:center; margin-bottom:44px; }\n  .section-label { display:inline-flex; align-items:center; gap:8px; margin-bottom:14px; }\n  .section-label .bar { width:20px; height:3px; background:var(--lime); border-radius:2px; }\n  .section-label span { font-size:12px; font-weight:700; color:var(--navy); letter-spacing:0.06em; text-transform:uppercase; }\n  .section-header h2 { font-size:30px; font-weight:800; color:var(--navy); line-height:1.2; letter-spacing:-0.03em; margin-bottom:8px; }\n  .section-header p { font-size:15px; color:var(--text-secondary); line-height:1.6; max-width:560px; margin:0 auto; }\n\n  .grid-top { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:16px; }\n  .grid-bottom { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:710px; margin:0 auto; }\n\n  .pcard {\n    background:var(--surface);\n    border:1px solid var(--border);\n    border-radius:var(--radius-xl);\n    padding:28px 24px;\n    cursor:pointer;\n    transition:all 0.25s;\n    position:relative; overflow:hidden;\n  }\n  .pcard::before {\n    content:''; position:absolute; top:0; left:0; right:0;\n    height:3px; background:var(--lime);\n    transform:scaleX(0); transform-origin:left;\n    transition:transform 0.3s;\n  }\n  .pcard:hover::before, .pcard.active::before { transform:scaleX(1); }\n  .pcard:hover { box-shadow:0 8px 28px rgba(45,47,107,0.07); transform:translateY(-3px); }\n  .pcard.active { border-color:var(--lime); }\n\n  .pcard-top {\n    display:flex; align-items:center; justify-content:space-between;\n    margin-bottom:12px;\n  }\n\n  .pcard-num {\n    font-size:32px; font-weight:800; color:var(--border);\n    letter-spacing:-0.04em; line-height:1;\n    transition:color 0.3s;\n  }\n  .pcard:hover .pcard-num, .pcard.active .pcard-num { color:var(--lime); }\n\n  .pcard-badges { display:flex; gap:4px; }\n  .pbadge {\n    font-size:10px; font-weight:700; padding:3px 8px;\n    border-radius:4px; letter-spacing:0.02em;\n  }\n  .pbadge-dur { background:var(--lime-dim); color:var(--navy); }\n  .pbadge-fmt { background:var(--light-bg); color:var(--text-muted); }\n\n  .pcard h3 {\n    font-size:16px; font-weight:700; color:var(--text-primary);\n    line-height:1.3; margin-bottom:6px;\n  }\n  .pcard > .pdesc {\n    font-size:13px; color:var(--text-secondary); line-height:1.6;\n  }\n\n  .pcard-detail {\n    max-height:0; overflow:hidden;\n    transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1), margin 0.3s, opacity 0.3s;\n    opacity:0; margin-top:0;\n  }\n  .pcard.active .pcard-detail {\n    max-height:200px; opacity:1; margin-top:14px;\n  }\n\n  .pcard-detail-inner {\n    padding-top:14px;\n    border-top:1px solid var(--border);\n    display:flex; flex-direction:column; gap:8px;\n  }\n\n  .pd-item {\n    display:flex; align-items:center; gap:8px;\n    font-size:12px; font-weight:600; color:var(--text-primary);\n  }\n  .pd-dot {\n    width:6px; height:6px; border-radius:50%;\n    background:var(--lime); flex-shrink:0;\n  }\n\n  .pcard-arrow {\n    display:flex; align-items:center; gap:4px;\n    margin-top:12px;\n    font-size:11px; font-weight:600; color:var(--navy);\n    transition:gap 0.2s;\n  }\n  .pcard:hover .pcard-arrow { gap:8px; }\n  .pcard.active .pcard-arrow .arrow-text { display:none; }\n\n  @media (max-width:768px) {\n    .section { padding:40px 20px; }\n    .grid-top, .grid-bottom { grid-template-columns:1fr; }\n    .grid-bottom { max-width:100%; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<section class=\"section\">\n  <div class=\"section-inner\">\n\n    <div class=\"section-header\">\n      <div class=\"section-label\"><div class=\"bar\"><\/div><span>Our methodology<\/span><div class=\"bar\"><\/div><\/div>\n      <h2>How Edstellar delivers results<\/h2>\n      <p>A structured 5-step methodology that moves from discovery to measurable impact. Click any step to see the details.<\/p>\n    <\/div>\n\n    <div class=\"grid-top\">\n\n      <div class=\"pcard active\" onclick=\"toggleStep(this)\">\n        <div class=\"pcard-top\">\n          <div class=\"pcard-num\">01<\/div>\n          <div class=\"pcard-badges\"><span class=\"pbadge pbadge-dur\">2–3 weeks<\/span><span class=\"pbadge pbadge-fmt\">Workshop<\/span><\/div>\n        <\/div>\n        <h3>Discovery & scoping<\/h3>\n        <div class=\"pdesc\">Assess current state, stakeholder needs, and define engagement objectives.<\/div>\n        <div class=\"pcard-detail\">\n          <div class=\"pcard-detail-inner\">\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Stakeholder interviews<\/div>\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Data & document review<\/div>\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Scope & success criteria definition<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"pcard-arrow\"><span class=\"arrow-text\">See details<\/span> <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 6h8M7 3l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/div>\n      <\/div>\n\n      <div class=\"pcard\" onclick=\"toggleStep(this)\">\n        <div class=\"pcard-top\">\n          <div class=\"pcard-num\">02<\/div>\n          <div class=\"pcard-badges\"><span class=\"pbadge pbadge-dur\">2–4 weeks<\/span><span class=\"pbadge pbadge-fmt\">Assessment<\/span><\/div>\n        <\/div>\n        <h3>Diagnosis & analysis<\/h3>\n        <div class=\"pdesc\">Deep capability gap analysis and organisational readiness benchmarking.<\/div>\n        <div class=\"pcard-detail\">\n          <div class=\"pcard-detail-inner\">\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Skills gap mapping<\/div>\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Benchmark analysis<\/div>\n            <div class=\"pd-item\"><div class=\"pd-dot\"><\/div>Priority heat map<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"pcard-arrow\"><span class=\"arrow-text\">See details<\/span> <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 6h8M7 3l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/div>\n      <\/div>\n\n      <div class=\"pcard\" onclick=\"toggleStep(this)\">\n        <div class=\"pcard-top\">\n          <div class=\"pcard-num\">03<\/div>\n          <div class=\"pcard-badges\"><span class=\"pbadge pbadge-dur\">2–3 weeks<\/span><span class=\"pbadge pbadge-fmt\">Co-design<\/span><\/div>\n        <\/div>\n        <h3>Strategy & design<\/h3>\n        <div class=\"pdesc\">Co-create solution architecture, frameworks, and implementation roadmap.<\/div>\n        <div class=\"pcard-detail\">\n          <div class=\"pcard-detail-inner\">\n \n    --text-secondary: #5C5E6E;\n    --text-muted: #8A8C9A;\n    --text-body-light: #D0D2E0;\n    --text-muted-navy: #9496B0;\n    --border: #DCDEE5;\n    --border-navy: rgba(255,255,255,0.1);\n    --radius: 10px;\n    --radius-lg: 16px;\n    --radius-xl: 24px;\n    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;\n  }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font); background:var(--light-bg); -webkit-font-smoothing:antialiased; }\n\n  .section {\n    padding: 64px 48px;\n    background: var(--navy);\n    position: relative;\n    overflow: hidden;\n  }\n  .section::before {\n    content:'';\n    position:absolute; top:0; right:0; bottom:0; width:45%;\n    background: rgba(0,0,0,0.15);\n    border-radius: 200px 0 0 200px;\n    pointer-events: none;\n  }\n  .section-inner {\n    max-width: 1060px;\n    margin: 0 auto;\n    display: grid;\n    grid-template-columns: 280px 1fr;\n    gap: 48px;\n    position: relative;\n    z-index: 1;\n  }\n\n  .sidebar h2 {\n    font-size: 28px; font-weight: 800; color: var(--white);\n    line-height: 1.2; letter-spacing: -0.03em; margin-bottom: 28px;\n  }\n  .service-list { display: flex; flex-direction: column; gap: 0; }\n  .service-item {\n    padding: 14px 16px;\n    font-size: 15px; font-weight: 600; color: var(--text-muted-navy);\n    cursor: pointer; transition: all 0.2s;\n    border-left: 3px solid transparent;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .service-item:hover { color: var(--white); }\n  .service-item.active {\n    color: var(--white);\n    border-left-color: var(--lime);\n    background: rgba(255,255,255,0.06);\n  }\n  .service-item .arrow {\n    font-size: 11px; color: var(--lime); opacity: 0;\n    transition: opacity 0.2s;\n  }\n  .service-item.active .arrow { opacity: 1; }\n\n  .card-area {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    min-height: 380px;\n    position: relative;\n  }\n\n  .service-card {\n    background: var(--surface);\n    border-radius: var(--radius-xl);\n    padding: 40px 36px;\n    max-width: 520px;\n    width: 100%;\n    position: absolute;\n    opacity: 0;\n    transform: translateX(60px) scale(0.95);\n    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);\n    pointer-events: none;\n  }\n  .service-card.active {\n    opacity: 1;\n    transform: translateX(0) scale(1);\n    pointer-events: auto;\n    position: relative;\n  }\n  .service-card.prev {\n    opacity: 0.3;\n    transform: translateX(-40px) scale(0.9);\n  }\n\n  .card-label {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 11px; font-weight: 700; color: var(--navy);\n    letter-spacing: 0.06em; text-transform: uppercase;\n    padding: 4px 12px; background: var(--lime-dim);\n    border-radius: 6px; margin-bottom: 16px;\n  }\n  .card-label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime); }\n\n  .service-card h3 {\n    font-size: 22px; font-weight: 800; color: var(--text-primary);\n    line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 14px;\n  }\n  .service-card p {\n    font-size: 14px; color: var(--text-secondary); line-height: 1.7;\n    margin-bottom: 24px;\n  }\n  .explore-link {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 14px; font-weight: 700; color: var(--navy);\n    text-decoration: none; cursor: pointer; transition: gap 0.2s;\n  }\n  .explore-link:hover { gap: 12px; }\n  .explore-link svg { transition: transform 0.2s; }\n\n  .card-nav {\n    display: flex; gap: 8px; margin-top: 20px;\n    justify-content: center;\n  }\n  .card-dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: var(--border);\n    cursor: pointer; transition: all 0.2s;\n  }\n  .card-dot.active {\n    background: var(--lime);\n    width: 24px; border-radius: 4px;\n  }\n\n  @media (max-width: 768px) {\n    .section { padding: 40px 20px; }\n    .section::before { display: none; }\n    .section-inner { grid-template-columns: 1fr; gap: 28px; }\n    .service-list { flex-direction: row; overflow-x: auto; gap: 0; }\n    .service-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; padding: 10px 16px; font-size: 13px; }\n    .service-item.active { border-bottom-color: var(--lime); border-left-color: transparent; }\n    .card-area { min-height: 320px; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<section class=\"section\">\n  <div class=\"section-inner\">\n\n    <div class=\"sidebar\">\n      <h2>Our consulting services<\/h2>\n      <div class=\"service-list\" id=\"serviceList\">\n        <div class=\"service-item active\" onclick=\"showService(0)\">\n          <span class=\"arrow\">&#9654;<\/span> L&D Strategy Consulting\n        <\/div>\n        <div class=\"service-item\" onclick=\"showService(1)\">\n          <span class=\"arrow\">&#9654;<\/span> Talent Assessment\n        <\/div>\n        <div class=\"service-item\" onclick=\"showService(2)\">\n          <span class=\"arrow\">&#9654;<\/span> Leadership Development\n        <\/div>\n        <div class=\"service-item\" onclick=\"showService(3)\">\n          <span class=\"arrow\">&#9654;<\/span> Skills Gap Analysis\n        <\/div>\n        <div class=\"service-item\" onclick=\"showService(4)\">\n          <span class=\"arrow\">&#9654;<\/span> Change Management\n        <\/div>\n        <div class=\"service-item\" onclick=\"showService(5)\">\n          <span class=\"arrow\">&#9654;<\/span> Compliance Training Design\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div>\n      <div class=\"card-area\" id=\"cardArea\">\n\n        <div class=\"service-card active\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>L&D Strategy Consulting<\/h3>\n          <p>We help organisations design strategic learning ecosystems that align workforce development with business goals, close critical skill gaps, and deliver measurable impact. Our consultants work alongside your team to build capability, not dependency.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n        <div class=\"service-card\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>Talent Assessment<\/h3>\n          <p>Identify skill gaps and build a data-driven talent strategy. Our assessment consulting delivers governed, verifiable workforce intelligence that your leadership team can act on with confidence across all levels of the organisation.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n        <div class=\"service-card\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>Leadership Development<\/h3>\n          <p>Build leaders who drive transformation at every level. Our leadership consulting combines behavioural science with practical frameworks to develop leaders who align teams, accelerate growth, and create lasting organisational impact.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n        <div class=\"service-card\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>Skills Gap Analysis<\/h3>\n          <p>Map your current workforce capabilities against future requirements. Our structured analysis identifies exactly where skill shortfalls exist, what they cost, and how to close them with targeted development interventions.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n        <div class=\"service-card\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>Change Management<\/h3>\n          <p>Navigate complex organisational transformations with structured change management frameworks. We prepare your people, processes, and culture for successful adoption of new systems, structures, and strategies.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n        <div class=\"service-card\">\n          <div class=\"card-label\"><span class=\"dot\"><\/span> Consulting service<\/div>\n          <h3>Compliance Training Design<\/h3>\n          <p>Design and deploy compliance training programs that meet regulatory requirements while engaging your workforce. Our approach ensures measurable knowledge transfer and audit-ready documentation across all mandated areas.<\/p>\n          <a class=\"explore-link\">Explore more <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M8 4l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/a>\n        <\/div>\n\n      <\/div>\n\n      <div class=\"card-nav\" id=\"cardNav\">\n        <div class=\"card-dot active\" onclick=\"showService(0)\"><\/div>\n        <div class=\"card-dot\" onclick=\"showService(1)\"><\/div>\n        <div class=\"card-dot\" onclick=\"showService(2)\"><\/div>\n        <div class=\"card-dot\" onclick=\"showService(3)\"><\/div>\n        <div class=\"card-dot\" onclick=\"showService(4)\"><\/div>\n        <div class=\"card-dot\" onclick=\"showService(5)\"><\/div>\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/section>\n\n<script>\nfunction showService(idx) {\n  var items = document.querySelectorAll('.service-item');\n  var cards = document.querySelectorAll('.service-card');\n  var dots = document.querySelectorAll('.card-dot');\n  items.forEach(function(el, i) { el.classList.toggle('active', i === idx); });\n  cards.forEach(function(el, i) {\n    el.classList.remove('active','prev');\n    if (i === idx) el.classList.add('active');\n    else if (i === idx - 1) el.classList.add('prev');\n  });\n  dots.forEach(function(el, i) { el.classList.toggle('active', i === idx); });\n}\n<\/script>\n\n<\/body>\n<\/html>\n","edstellar-services-option-b.html":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Edstellar — Services Section: Option B (Tab Pills)<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --navy: #2D2F6B;\n    --navy-card: #2E3054;\n    --navy-light: #3A3C7E;\n    --lime: #C5E826;\n    --lime-text: #1A2600;\n    --lime-dim: rgba(197,232,38,0.10);\n    --white: #FFFFFF;\n    --light-bg: #EEF0F4;\n    --surface: #FFFFFF;\n    --text-primary: #1A1A2E;\n    --text-secondary: #5C5E6E;\n    --text-body-light: #D0D2E0;\n    --text-muted-navy: #9496B0;\n    --border: #DCDEE5;\n    --border-navy: rgba(255,255,255,0.12);\n    --radius: 10px;\n    --radius-lg: 16px;\n    --radius-xl: 24px;\n    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;\n  }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font); background:var(--light-bg); -webkit-font-smoothing:antialiased; }\n\n  .section {\n    padding: 64px 48px;\n    background: var(--light-bg);\n  }\n  .section-inner {\n    max-width: 1060px;\n    margin: 0 auto;\n  }\n\n  .section-header {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    margin-bottom: 32px; flex-wrap: wrap; gap: 16px;\n  }\n  .section-header-left {}\n  .section-label {\n    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;\n  }\n  .section-label .bar { width: 24px; height: 3px; background: var(--lime); border-radius: 2px; }\n  .section-label span {\n    font-size: 12px; font-weight: 700; color: var(--navy);\n    letter-spacing: 0.06em; text-transform: uppercase;\n  }\n  .section-header h2 {\n    font-size: 30px; font-weight: 800; color: var(--navy);\n    line-height: 1.2; letter-spacing: -0.03em;\n  }\n\n  .tab-pills {\n    display: flex; gap: 6px; flex-wrap: wrap;\n    margin-bottom: 28px;\n  }\n  .tab-pill {\n    padding: 10px 20px;\n    font-family: var(--font);\n    font-size: 13px; font-weight: 600;\n    border: 1.5px solid var(--border);\n    border-radius: 50px;\n    background: var(--surface);\n    color: var(--text-secondary);\n    cursor: pointer;\n    transition: all 0.2s;\n  }\n  .tab-pill:hover { border-color: var(--navy); color: var(--navy); }\n  .tab-pill.active {\n    background: var(--navy);\n    border-color: var(--navy);\n    color: var(--white);\n  }\n\n  .detail-panel {\n    display: none;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-xl);\n    overflow: hidden;\n    animation: slideDown 0.3s ease-out;\n  }\n  .detail-panel.active { display: grid; grid-template-columns: 55% 45%; }\n  @keyframes slideDown {\n    from { opacity: 0; transform: translateY(-8px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  .detail-content {\n    padding: 40px 36px;\n  }\n  .detail-num {\n    font-size: 48px; font-weight: 800  #2E3054;\n    --lime: #C5E826;\n    --lime-text: #1A2600;\n    --lime-dim: rgba(197,232,38,0.10);\n    --white: #FFFFFF;\n    --light-bg: #EEF0F4;\n    --surface: #FFFFFF;\n    --text-primary: #1A1A2E;\n    --text-secondary: #5C5E6E;\n    --text-body-light: #D0D2E0;\n    --text-muted-navy: #9496B0;\n    --border: #DCDEE5;\n    --border-navy: rgba(255,255,255,0.1);\n    --radius-lg: 16px;\n    --radius-xl: 24px;\n    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;\n  }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font); background:var(--light-bg); -webkit-font-smoothing:antialiased; }\n\n  .section { padding:64px 48px; background:var(--surface); }\n  .section-inner { max-width:1060px; margin:0 auto; }\n\n  .section-header { text-align:center; margin-bottom:40px; }\n  .section-label { display:inline-flex; align-items:center; gap:8px; margin-bottom:12px; }\n  .section-label .bar { width:20px; height:3px; background:var(--lime); border-radius:2px; }\n  .section-label span { font-size:12px; font-weight:700; color:var(--navy); letter-spacing:0.06em; text-transform:uppercase; }\n  .section-header h2 { font-size:30px; font-weight:800; color:var(--navy); line-height:1.2; letter-spacing:-0.03em; }\n\n  .story-card {\n    background:var(--navy);\n    border-radius:var(--radius-xl);\n    overflow:hidden;\n    position:relative;\n  }\n\n  .story-panels { position:relative; min-height:420px; }\n  .story-panel {\n    display:none;\n    animation:fadeIn 0.4s ease;\n  }\n  .story-panel.active { display:block; }\n  @keyframes fadeIn { from{opacity:0} to{opacity:1} }\n\n  .panel-inner {\n    display:grid;\n    grid-template-columns:42% 55%;\n    gap:3%;\n  }\n\n  .panel-image {\n    min-height:420px;\n    background:#C8CAD8; overflow:hidden;\n    display:flex; flex-direction:column;\n    align-items:center; justify-content:center; gap:6px;\n    font-size:11px; color:var(--text-muted); font-weight:500;\n  }\n  .panel-image svg { opacity:0.15; }\n\n  .panel-content {\n    padding:44px 36px 44px 0;\n    display:flex; flex-direction:column; justify-content:center;\n  }\n\n  .big-quote {\n    font-size:48px; font-weight:800; color:var(--lime); line-height:1;\n    margin-bottom:12px; opacity:0.4;\n  }\n  .panel-content blockquote {\n    font-size:16px; color:var(--text-body-light); line-height:1.7;\n    font-style:italic; margin-bottom:16px;\n  }\n  .panel-author {\n    font-size:14px; font-weight:700; color:var(--white);\n    margin-bottom:6px;\n  }\n  .panel-role {\n    font-size:12px; color:var(--text-muted-navy); margin-bottom:28px;\n  }\n\n  .panel-stats {\n    display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\n    padding-top:20px;\n    border-top:1px solid var(--border-navy);\n  }\n  .ps .num {\n    font-size:32px; font-weight:800; color:var(--white);\n    letter-spacing:-0.04em; line-height:1;\n  }\n  .ps .num .sym { color:var(--lime); }\n  .ps .label {\n    font-size:11px; color:var(--text-muted-navy); line-height:1.45;\n    margin-top:4px; font-weight:500;\n  }\n\n  .story-nav {\n    display:flex; align-items:center; justify-content:center;\n    gap:12px; padding:20px 0;\n  }\n  .sn-btn {\n    width:40px; height:40px; border-radius:50%;\n    border:1.5px solid var(--border); background:var(--surface);\n    cursor:pointer; display:flex; align-items:center; justify-content:center;\n    transition:all 0.2s;\n  }\n  .sn-btn:hover { border-color:var(--navy); background:var(--lime-dim); }\n  .sn-counter {\n    font-size:13px; font-weight:700; color:var(--text-secondary);\n    min-width:48px; text-align:center;\n  }\n  .sn-counter .cur { color:var(--navy); }\n\n  @media (max-width:768px) {\n    .section { padding:40px 20px; }\n    .panel-inner { grid-template-columns:1fr; }\n    .panel-image { min-height:220px; }\n    .panel-content { padding:28px 24px; }\n    .panel-stats { grid-template-columns:1fr; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<section class=\"section\">\n  <div class=\"section-inner\">\n\n    <div class=\"section-header\">\n      <div class=\"section-label\"><div class=\"bar\"><\/div><span>Client impact<\/span><div class=\"bar\"><\/div><\/div>\n      <h2>Success stories & results<\/h2>\n    <\/div>\n\n    <div class=\"story-card\">\n      <div class=\"story-panels\" id=\"storyPanels\">\n\n        <div class=\"story-panel active\">\n          <div class=\"panel-inner\">\n            <div class=\"panel-image\">\n              <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"34\" height=\"34\" rx=\"6\" stroke=\"currentColor\" stroke-width=\"2\"/><circle cx=\"14\" cy=\"15\" r=\"4\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M3 30l9-9 5 5 7-7L37 32\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\/svg>\n              <span>Client success image<\/span>\n            <\/div>\n            <div class=\"panel-content\">\n              <div class=\"big-quote\">\"<\/div>\n              <blockquote>We needed more than a set of leadership workshops. Edstellar helped us define leadership expectations, map role-based capability gaps, and launch a structured development journey across business units.<\/blockquote>\n              <div class=\"panel-author\">Chief Human Resources Officer<\/div>\n              <div class=\"panel-role\">Large multi-location organization<\/div>\n              <div class=\"panel-stats\">\n                <div class=\"ps\"><div class=\"num\">42<span class=\"sym\">%<\/span><\/div><div class=\"label\">Leadership readiness improvement<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">28<span class=\"sym\">%<\/span><\/div><div class=\"label\">Successor readiness increase<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">37<span class=\"sym\">%<\/span><\/div><div class=\"label\">Higher learning adoption<\/div><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"story-panel\">\n          <div class=\"panel-inner\">\n            <div class=\"panel-image\">\n              <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"34\" height=\"34\" rx=\"6\" stroke=\"currentColor\" stroke-width=\"2\"/><circle cx=\"14\" cy=\"15\" r=\"4\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M3 30l9-9 5 5 7-7L37 32\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\/svg>\n              <span>Assessment workshop image<\/span>\n            <\/div>\n            <div class=\"panel-content\">\n              <div class=\"big-quote\">\"<\/div>\n              <blockquote>Edstellar's talent assessment framework gave us the first-ever enterprise-wide view of our workforce capabilities. Our board now trusts the data for succession decisions.<\/blockquote>\n              <div class=\"panel-author\">VP of Talent Management<\/div>\n              <div class=\"panel-role\">Fortune 500 manufacturing company<\/div>\n              <div class=\"panel-stats\">\n                <div class=\"ps\"><div class=\"num\">95<span class=\"sym\">%<\/span><\/div><div class=\"label\">Skill data verified and auditable<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">3<span class=\"sym\">×<\/span><\/div><div class=\"label\">Faster succession planning<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">60<span class=\"sym\">%<\/span><\/div><div class=\"label\">Reduction in external hiring<\/div><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"story-panel\">\n          <div class=\"panel-inner\">\n            <div class=\"panel-image\">\n              <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"34\" height=\"34\" rx=\"6\" stroke=\"currentColor\" stroke-width=\"2\"/><circle cx=\"14\" cy=\"15\" r=\"4\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M3 30l9-9 5 5 7-7L37 32\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\/svg>\n              <span>Compliance training image<\/span>\n            <\/div>\n            <div class=\"panel-content\">\n              <div class=\"big-quote\">\"<\/div>\n              <blockquote>The compliance training program Edstellar designed wasn't just checkbox learning. It was engaging, role-specific, and gave our regulators exactly the documentation trail they needed.<\/blockquote>\n              <div class=\"panel-author\">Head of Compliance<\/div>\n              <div class=\"panel-role\">Global financial services firm<\/div>\n              <div class=\"panel-stats\">\n                <div class=\"ps\"><div class=\"num\">100<span class=\"sym\">%<\/span><\/div><div class=\"label\">Audit pass rate<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">54<span class=\"sym\">%<\/span><\/div><div class=\"label\">Training time reduced<\/div><\/div>\n                <div class=\"ps\"><div class=\"num\">89<span class=\"sym\">%<\/span><\/div><div class=\"label\">Employee engagement<\/div><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n      <\/div>\n    <\/div>\n\n    <div class=\"story-nav\">\n      <button class=\"sn-btn\" onclick=\"navStory(-1)\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M9 3l-4 4 4 4\" stroke=\"var(--navy)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/button>\n      <div class=\"sn-counter\"><span class=\"cur\" id=\"curNum\">01<\/span> / 03<\/div>\n      <button class=\"sn-btn\" onclick=\"navStory(1)\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M5 3l4 4-4 4\" stroke=\"var(--navy)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/button>\n    <\/div>\n\n  <\/div>\n<\/section>\n\n<script>\nvar cur = 0;\nvar panels = document.querySelectorAll('.story-panel');\nfunction navStory(dir) {\n  cur = (cur + dir + panels.length) % panels.length;\n  panels.forEach(function(p,i) { p.classList.toggle('active', i===cur); });\n  document.getElementById('curNum').textContent = String(cur+1).padStart(2,'0');\n}\n<\/script>\n\n<\/body>\n<\/html>\n","edstellar-success-stories-light-version-with-image.html":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Edstellar — Success Stories: Option A (Split Quote + Stats)<\/title>\n<link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --navy: #2D2F6B;\n    --lime: #C5E826;\n    --lime-text: #1A2600;\n    --white: #FFFFFF;\n    --light-bg: #EEF0F4;\n    --surface: #FFFFFF;\n    --text-primary: #1A1A2E;\n    --text-secondary: #5C5E6E;\n    --text-muted: #8A8C9A;\n    --border: #DCDEE5;\n    --radius-lg: 16px;\n    --radius-xl: 24px;\n    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;\n  }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font); background:var(--light-bg); -webkit-font-smoothing:antialiased; }\n\n  .section { padding:64px 48px; background:var(--light-bg); }\n  .section-inner { max-width:1060px; margin:0 auto; }\n\n  .section-top {\n    display:flex; align-items:center; justify-content:space-between;\n    margin-bottom:36px;\n  }\n  .section-top h2 {\n    font-size:30px; font-weight:800; line-height:1.2; letter-spacing:-0.03em;\n  }\n  .section-top h2 .accent { color:var(--navy); }\n  .section-top h2 .normal { color:var(--text-primary); }\n\n  .nav-arrows { display:flex; gap:8px; }\n  .nav-arrow {\n    width:44px; height:44px; border-radius:50%;\n    border:none; cursor:pointer;\n    display:flex; align-items:center; justify-content:center;\n    font-family:var(--font); transition:all 0.2s;\n  }\n  .nav-arrow.prev { background:var(--navy); }\n  .nav-arrow.next { background:var(--lime); }\n  .nav-arrow:hover { transform:scale(1.08); }\n\n  .stories-track { position:relative; overflow:hidden; }\n  .story-slide {\n    display:none;\n    animation:fadeSlide 0.4s ease-out;\n  }\n  .story-slide.active { display:grid; grid-template-columns:52% 45%; gap:3%; }\n  @keyframes fadeSlide {\n    from { opacity:0; transform:translateX(30px); }\n    to { opacity:1; transform:translateX(0); }\n  }\n\n  .story-image {\n    border-radius:var(--radius-xl); overflow:hidden;\n    background:#C8CAD8; min-height:340px;\n    display:flex; flex-direction:column;\n    align-items:center; justify-content:center; gap:6px;\n    font-size:11px; color:var(--text-muted); font-weight:500;\n  }\n  .story-image svg { opacity:0.15; }\n\n  .story-content { display:flex; flex-direction:column; justify-content:center; }\n\n  .quote-block {\n    border-left:4px solid var(--navy);\n    padding-left:20px;\n    margin-bottom:20px;\n  }\n  .quote-block p {\n    font-size:15px; color:var(--text-primary); line-height:1.7;\n    font-style:italic;\n  }\n  .quote-author {\n    font-size:14px; font-weight:700; color:var(--text-primary);\n    margin-bottom:28px;\n  }\n\n  .result-stats {\n    display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\n  }\n  .result-stat {}\n  .result-stat .num {\n    font-size:36px; font-weight:800; color:var(--text-primary);\n    letter-spacing:-0.04em; line-height:1;\n  }\n  .result-stat .num .sym { color:var(--lime); }\n  .result-stat .label {\n    font-size:12px; color:var(--text-secondary); line-height:1.5;\n    margin-top:6px; font-weight:500;\n  }\n\n  .slide-dots {\n    display:flex; gap:6px; justify-content:center; margin-top:28px;\n  }\n  .slide-dot {\n    width:8px; height:8px; border-radius:50%;\n    background:var(--border); cursor:pointer; transition:all 0.2s;\n  }\n  .slide-dot.active { background:var(--lime); width:24px; border-radius:4px; }\n\n  @media (max-width:768px) {\n    .section { padding:40px 20px; }\n    .story-slide.active { grid-template-columns:1fr; gap:24px; }\n    .story-image { min-height:220px; }\n    .result-stats { grid-template-columns:1fr; gap:12px; }\n  }\n<\/style>\n<\/head>\n<body>\n\n<section class=\"section\">\n  <div class=\"section-inner\">\n\n    <div class=\"section-top\">\n      <h2><span class=\"accent\">L&D Consulting<\/span> <span class=\"normal\">Success Stories & Results<\/span><\/h2>\n      <div class=\"nav-arrows\">\n        <button class=\"nav-arrow prev\" onclick=\"changeSlide(-1)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M10 4l-4 4 4 4\" stroke=\"var(--white)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/button>\n        <button class=\"nav-arrow next\" onclick=\"changeSlide(1)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M6 4l4 4-4 4\" stroke=\"var(--lime-text)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\/svg><\/button>\n      <\/div>\n    <\/div>\n\n    <div class=\"stories-track\" id=\"storiesTrack\">\n\n      <div class=\"story-slide active\">\n        <div class=\"story-image\">\n          <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"34\" height=\"34\" rx=\"6\" stroke=\"currentColor\" stroke-width=\"2\"/><circle cx=\"14\" cy=\"15\" r=\"4\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M3 30l9-9 5 5 7-7L37 32\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\/svg>\n          <span>Team celebration image<\/span>\n        <\/div>\n        <div class=\"story-content\">\n          <div class=\"quote-block\">\n            <p>\"We needed more than a set of leadership workshops. Edstellar helped us define leadership expectations, map role-based capability gaps, and launch a structured development journey across business units. The result was a more consistent leadership pipeline and e business needs, enabling us to proactively address skill gaps and build a more agile workforce.\"<\/div>\n          <div class=\"quote-author\">\n            <div class=\"author-avatar\">RH<\/div>\n            <div>\n              <div class=\"author-name\">Rebecca Harris<\/div>\n              <div class=\"author-role\">Chief Talent Officer, fast-growing financial services company based in the United States<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"quote-card\">\n          <div class=\"quote-text\">\"What set Edstellar apart was their consultants' deep understanding of our industry. They didn't just deliver frameworks — they embedded themselves in our context and built something we could actually use and sustain.\"<\/div>\n          <div class=\"quote-author\">\n            <div class=\"author-avatar\">KP<\/div>\n            <div>\n              <div class=\"author-name\">Kumar Patel<\/div>\n              <div class=\"author-role\">VP of Learning & Development, multinational manufacturing conglomerate based in India<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"quote-card\">\n          <div class=\"quote-text\">\"The leadership development program Edstellar designed for us transformed how we identify and develop high-potential talent. Our succession pipeline is stronger than it's ever been.\"<\/div>\n          <div class=\"quote-author\">\n            <div class=\"author-avatar\">SM<\/div>\n            <div>\n              <div class=\"author-name\">Sarah Mitchell<\/div>\n              <div class=\"author-role\">CHRO, Fortune 500 technology enterprise based in Europe<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"quote-card\">\n          <div class=\"quote-text\">\"Edstellar helped us move from reactive compliance training to a proactive, role-specific program that our employees actually engage with. Our audit pass rate went to 100% with   sidebar.innerHTML = sHTML;

  function renderCards(filter, search) {
    var main = document.getElementById('mainContent');
    var viewMode = document.querySelector('.view-btn.active').dataset.view;
    var html = '';
    var visibleCount = 0;
    CATEGORIES.forEach(function(cat) {
      if (filter !== 'all' && filter !== cat.key) return;
      var filtered = cat.items.filter(function(item) {
        if (!search) return true;
        var s = search.toLowerCase();
        return item.code.toLowerCase().indexOf(s) > -1 || item.name.toLowerCase().indexOf(s) > -1 || item.best.toLowerCase().indexOf(s) > -1 || item.tags.some(function(t) { return t.toLowerCase().indexOf(s) > -1; }) || cat.label.toLowerCase().indexOf(s) > -1;
      });
      if (filtered.length === 0) return;
      visibleCount += filtered.length;
      html += '<div class="category-section" id="cat-' + cat.key + '"><div class="category-heading"><h2>' + cat.icon + ' ' + cat.label + '</h2><p>' + cat.desc + '</p></div><div class="' + viewMode + '">';

        var tagHTML = item.tags.map(function(t, i) { var cls = t.toLowerCase().indexOf('interactive') > -1 ? 'interactive' : (i === 0 ? 'layout' : ''); return '<span class="card-tag ' + cls + '">' + t + '</span>'; }).join('');

      });
      html += '</div></div>';
    });
    if (visibleCount === 0) html = '<div class="empty-state"><h3>No components found</h3><p>Try a different search term or category</p></div>';
    main.innerHTML = html;

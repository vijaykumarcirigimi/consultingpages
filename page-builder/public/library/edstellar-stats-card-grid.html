<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edstellar — Stats Section: Card Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-card: #2E3054;
    --lime: #C5E826;
    --white: #FFFFFF;
    --text-body: #B8BAC8;
    --light-bg: #EDEEF2;
    --radius-lg: 14px;
    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--light-bg);
    -webkit-font-smoothing: antialiased;
  }

  .stats-section {
    padding: 52px 48px 56px;
    background: var(--light-bg);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 1120px;
    margin: 0 auto;
  }

  .stat-card {
    background: var(--navy-card);
    border-radius: var(--radius-lg);
    padding: 28px 24px 30px;
  }

  .stat-bar {
    width: 28px;
    height: 3px;
    background: var(--lime);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .stat-number {
    font-size: 44px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .stat-number .symbol {
    color: var(--lime);
  }

  .stat-label {
    font-size: 14px;
    color: var(--text-body);
    margin-top: 12px;
    line-height: 1.5;
    font-weight: 500;
  }

  @media (max-width: 900px) {
    .stats-section { padding: 36px 20px 40px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 520px) {
    .stats-grid { grid-template-columns: 1fr; }
    .stat-number { font-size: 36px; }
  }
</style>
</head>
<body>

<section class="stats-section">
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-bar"></div>
      <div class="stat-number">300<span class="symbol">+</span></div>
      <div class="stat-label">Clients trust us with their L&D needs</div>
    </div>

    <div class="stat-card">
      <div class="stat-bar"></div>
      <div class="stat-number">20<span class="symbol">+</span></div>
      <div class="stat-label">Industries served globally</div>
    </div>

    <div class="stat-card">
      <div class="stat-bar"></div>
      <div class="stat-number">95<span class="symbol">%</span></div>
      <div class="stat-label">Clients identify critical capability gaps</div>
    </div>

    <div class="stat-card">
      <div class="stat-bar"></div>
      <div class="stat-number">92<span class="symbol">%</span></div>
      <div class="stat-label">Say our insights shaped key L&D decisions</div>
    </div>

  </div>
</section>

</body>
</html>
